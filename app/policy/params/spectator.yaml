spectator:
  prediction:
    max_per_deal: 1
    min_price: 1
    max_price: 99999999
    comment_max_length: 200
    reveal_after_close: true

  scoring:
    tiers:
      - name: "exact"
        max_error_pct: 0
        points: 5
        label: "정확 적중"
      - name: "close"
        max_error_pct: 1
        points: 3
        label: "근접"
      - name: "good"
        max_error_pct: 3
        points: 2
        label: "우수"
      - name: "participate"
        max_error_pct: 5
        points: 1
        label: "참여"
    miss_points: 0

  settlement:
    target_status:
      - "PAID"
    pick: "first"

  ranks:
    tiers:
      - name: "master"
        label: "가격의 신"
        condition_rank_lte: 1
        bonus_points: 50
        badge: "gold_crown"
      - name: "champion"
        label: "시세 달인"
        condition_rank_lte: 3
        bonus_points: 20
        badge: "silver_medal"
      - name: "pro"
        label: "눈썰미 프로"
        condition_rank_lte: 10
        bonus_points: 0
        badge: "bronze_medal"
      - name: "rookie"
        label: "관전 루키"
        condition_predictions_gte: 5
        bonus_points: 0
        badge: "green_badge"

  ranking:
    period: "monthly"
    reset_day: 1
    sort_by:
      - "total_points:desc"
      - "hit_rate:desc"
      - "predictions_count:desc"
