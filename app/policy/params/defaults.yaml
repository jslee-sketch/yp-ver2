money:
  # 기본(폴백) 플랫폼 수수료율 (rate, 0~1)
  # seller.levels가 있으면 그게 1순위, 이 값은 fallback
  platform_fee_rate: 0.035

  # (레거시/폴백) actuator_commission_rate (rate, 0~1)
  actuator_commission_rate: 0.02

  # PG 수수료율 (rate, 0~1)
  pg_fee_rate: 0.033

  # (선택) 부가세율 (rate, 0~1)
  vat_rate: 0.10


time:
  payment_timeout_minutes: 5
  cooling_days: 7
  seller_decision_timeout_hours: 48
  deal_deadline_hours: 72
  offer_deadline_hours: 48


points_tier:
  points_earn_rate: 0.01
  points_expire_days: 365
  tier_window_days: 90
  tier_min_gmv: 300000


# ✅ v3.5+ : Seller 정책 SSOT
seller:
  default_level: "Lv.6"

  # 판매자 레벨별 플랫폼 수수료율 (rate, 0~1)
  # 예: 3.5% = 0.035
  levels:
    - level: "Lv.6"
      min_trades: 0
      max_trades: 20
      min_rating: null
      platform_fee_rate: 0.035

    - level: "Lv.5"
      min_trades: 21
      max_trades: 40
      min_rating: 4.0
      platform_fee_rate: 0.030

    - level: "Lv.4"
      min_trades: 41
      max_trades: 60
      min_rating: 4.0
      platform_fee_rate: 0.028

    - level: "Lv.3"
      min_trades: 61
      max_trades: 100
      min_rating: 4.0
      platform_fee_rate: 0.027

    - level: "Lv.2"
      min_trades: 101
      max_trades: null
      min_rating: 4.0
      platform_fee_rate: 0.025

    - level: "Lv.1"
      min_trades: 101
      max_trades: null
      min_rating: 4.5
      platform_fee_rate: 0.020

  # ✅ Actuator fee는 "rate(0~1)"로 저장하자 (강추)
  # 0.5% = 0.005
  actuator_fee_by_level_rate:
    "Lv.6": 0.005
    "Lv.5": 0.002
    "Lv.4": 0.001
    "Lv.3": 0.0
    "Lv.2": 0.0
    "Lv.1": 0.0


# ✅ v3.5+ : 이벤트 기반 포인트 (SSOT)
points:
  buyer_paid_reward_pt: 20
  buyer_refund_penalty_pt: -20
  recommender_reward_pt: 20


# ✅ v3.5+ : 리뷰 (SSOT)
review:
  review_window_days: 30
  verified_purchase_only: true

# ✅ 분쟁(Dispute) 정책 SSOT
dispute:
  # 분쟁 제기 가능 기간 (배송완료 후 n일 이내)
  open_window_days: 7
  # 관리자 처리 기한 (분쟁 접수 후 n일)
  resolution_deadline_days: 14
  # 분쟁 중 정산 자동 보류
  auto_hold_settlement: true
  # 분쟁 종료 후 정산 재개 지연일
  post_resolution_cooling_days: 3

# ✅ 정산 지급 지연일 SSOT (필요하면 운영에서 조정)
settlement:
  payout_delay_days_default: 30
  payout_delay_days_dispute_path: 30

# 배송 추적 설정
delivery:
  tracking_provider: sweettracker
  polling_interval_minutes: 30
  auto_confirm_days: 3
  max_batch_check: 100

# 세금계산서
tax_invoice:
  auto_generate_on_approved: true
  confirm_deadline_days: 7
  vat_rate: 0.1
  number_prefix: "YP"
  supplier:
    business_name: "(주)텔러스테크"
    business_number: "113-86-39805"
    representative: "이정상"
    address: "서울시 금천구 두산로 70 에이동 811호"
    business_type: "서비스"
    business_item: "소프트웨어 개발 및 공급"
    email: "sales@tellustech.co.kr"

# ✅ 액추에이터 정산/원천징수 설정
actuator:
  # 개인 액추에이터 원천징수
  personal:
    withholding_tax_rate: 0.033        # 소득세 3% + 지방소득세 0.3%
    income_tax_rate: 0.03
    local_tax_rate: 0.003
    payout_method: "bank_transfer"
    min_payout_amount: 10000           # 최소 지급액 (원)
  # 사업자 액추에이터 → 세금계산서 발행
  business:
    use_tax_invoice: true
    vat_rate: 0.1
  # 위탁계약서
  contract:
    current_version: "v1.0"
    required_before_payout: true

# ✅ 구매자 등급 체계
buyer_grade:
  tiers:
    bronze:
      min_purchases: 0
      point_multiplier: 1.0
    silver:
      min_purchases: 5
      point_multiplier: 1.2
    gold:
      min_purchases: 15
      point_multiplier: 1.5
    platinum:
      min_purchases: 30
      point_multiplier: 1.8
    diamond:
      min_purchases: 50
      point_multiplier: 2.0

# ✅ 관전 등급 체계
spectator_grade:
  tiers:
    rookie:
      min_predictions: 0
      badge: "🔰"
    amateur:
      min_predictions: 10
      badge: "⭐"
    pro:
      min_predictions: 30
      badge: "🌟"
    expert:
      min_predictions: 60
      badge: "💎"
    master:
      min_predictions: 100
      badge: "👑"

# ✅ 알림 시스템 설정
notifications:
  buyer_max_interests: 3
  seller_max_interests: 5
  actuator_max_interests: 10
  online_threshold_minutes: 5
  email_daily_limit: 20
  push_cooldown_minutes: 5
  chat_bundle_seconds: 30

# ✅ 관심 카테고리 프리셋
interest_categories:
  - 스마트폰
  - 노트북
  - 태블릿
  - TV/모니터
  - 가전
  - 게임/콘솔
  - 음향/이어폰
  - 카메라
  - 생활용품
  - 식품
  - 패션
  - 뷰티
  - 유아/키즈
  - 스포츠/아웃도어
  - 자동차용품