cs_process:
  # ── 취소 ──
  cancellation:
    instant_cancel_before: "shipping"
    seller_approval_required_status:
      - "preparing"
    seller_response_deadline_hours: 24

  # ── 반품/교환 ──
  return:
    cooling_days: 7
    seller_response_deadline_days: 3
    return_shipping_fee_buyer: 3000
    return_shipping_fee_seller: 0
    reasons:
      - code: "change_mind"
        label: "단순변심"
        shipping_fee: "buyer"
      - code: "size_color"
        label: "사이즈/색상 불일치"
        shipping_fee: "buyer"
      - code: "defective"
        label: "제품불량"
        shipping_fee: "seller"
      - code: "wrong_delivery"
        label: "오배송"
        shipping_fee: "seller"
      - code: "other"
        label: "기타"
        shipping_fee: "buyer"

  # ── 중재(분쟁) ──
  dispute:
    entry_requires_rejection: true
    entry_requires_payment: true

    # Round 1
    r1_respondent_deadline_days: 5
    r1_agreement_deadline_days: 3

    # Round 2
    r2_initiator_deadline_days: 3
    r2_respondent_deadline_days: 3
    r2_agreement_deadline_days: 3

    # 보상금 기재
    compensation_required: true
    compensation_types:
      - "fixed"
      - "percentage"

    # ── 결렬 후 ──
    post_failure:
      grace_period_days: 14
      max_hold_days: 90
      admin_final_decision: true

      # 직접 합의
      direct_agreement:
        enabled: true
        accept_deadline_days: 7
        compensation_required: true

      # 외부기관
      external_agency:
        enabled: true
        supported_types:
          - code: "kca"
            label: "한국소비자원"
            url: "https://www.kca.go.kr"
            phone: "1372"
            description: "피해구제 신청 → 합의 권고 → 분쟁조정위원회"
          - code: "small_claims"
            label: "소액사건심판"
            url: "https://www.scourt.go.kr"
            phone: "지역 관할 법원"
            description: "소송가액 3,000만원 이하, 1회 변론 원칙"
          - code: "other"
            label: "기타"
            url: ""
            phone: ""
            description: "기타 분쟁조정기관"
        auto_extend_hold: true

      # 관리자 강제 종결
      force_close:
        auto_on_grace_expiry: true
        auto_on_max_hold_expiry: true
        default_basis: "ai_proposal"
        reason_required: true

      # 알림 템플릿
      notifications:
        dispute_failed: "중재가 합의에 이르지 못했습니다. 14일 내 아래 방법으로 해결하실 수 있습니다."
        direct_agreement_proposed: "{proposer}님이 합의안을 제안했습니다."
        direct_agreement_completed: "직접 합의가 완료되었습니다. 환불/정산이 자동 처리됩니다."
        direct_agreement_rejected: "상대방이 합의안을 거절했습니다."
        direct_agreement_expired: "합의안 수락 기한(7일)이 만료되었습니다."
        external_agency_filed: "{filed_by}님이 {agency}에 분쟁조정을 신청했습니다."
        external_result_applied: "{agency} 결정이 반영되었습니다."
        admin_force_closed: "관리자가 최종 판정을 내렸습니다."

    # 정산 보류
    settlement_hold:
      scope: "dispute_amount_only"
      other_orders_affected: false

# ── 채팅 보존 정책 ──
chat:
  retention_days: 90
  max_messages_per_deal: 5000
  read_only_after_deal_end: true
